# NGPM — HTTP only (port 80). Use before TLS or behind a separate TLS terminator.
# Docker prod defaults: web → 127.0.0.1:6660, api → 127.0.0.1:6661
#
# Install:
#   sudo cp deploy/nginx/ngpm-http-only.conf /etc/nginx/sites-available/ngpm-http
#   sudo ln -sf /etc/nginx/sites-available/ngpm-http /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream ngpm_web {
    server 127.0.0.1:6660;
    keepalive 32;
}

upstream ngpm_api {
    server 127.0.0.1:6661;
    keepalive 16;
}

# Main site
server {
    listen 80;
    listen [::]:80;
    server_name ngpmandsmpm.org www.ngpmandsmpm.org;

    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://ngpm_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}

# API
server {
    listen 80;
    listen [::]:80;
    server_name api.ngpmandsmpm.org;

    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://ngpm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}
