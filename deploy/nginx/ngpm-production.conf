# NGPM production — use with Docker Compose prod (web :6660, api :6661).
#
# Install on the host (recommended):
#   1. sudo cp deploy/nginx/ngpm-production.conf /etc/nginx/sites-available/ngpm
#   2. sudo ln -s /etc/nginx/sites-available/ngpm /etc/nginx/sites-enabled/
#   3. Obtain certs (example with certbot):
#        sudo certbot certonly --nginx -d ngpmandsmpm.org -d www.ngpmandsmpm.org
#        sudo certbot certonly --nginx -d api.ngpmandsmpm.org
#   4. Update ssl_certificate paths below if certbot used different layout.
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# Upstreams: Docker publishes ports to the host (default 6660 / 6661).
# Change 127.0.0.1 if web/api listen elsewhere.

upstream ngpm_web {
    server 127.0.0.1:6660;
    keepalive 32;
}

upstream ngpm_api {
    server 127.0.0.1:6661;
    keepalive 16;
}

# ---- HTTP → HTTPS (site) ----
server {
    listen 80;
    listen [::]:80;
    server_name ngpmandsmpm.org www.ngpmandsmpm.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://ngpmandsmpm.org$request_uri;
    }
}

# Redirect www → apex (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ngpmandsmpm.org;

    ssl_certificate     /etc/letsencrypt/live/ngpmandsmpm.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ngpmandsmpm.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ngpmandsmpm.org$request_uri;
}

# ---- Main site (Next.js) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ngpmandsmpm.org;

    ssl_certificate     /etc/letsencrypt/live/ngpmandsmpm.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ngpmandsmpm.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://ngpm_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}

# ---- HTTP → HTTPS (API) ----
server {
    listen 80;
    listen [::]:80;
    server_name api.ngpmandsmpm.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.ngpmandsmpm.org$request_uri;
    }
}

# ---- API (Express + /uploads) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.ngpmandsmpm.org;

    ssl_certificate     /etc/letsencrypt/live/api.ngpmandsmpm.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ngpmandsmpm.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://ngpm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}

# ---------------------------------------------------------------------------
# Optional: single Let's Encrypt cert covering all hostnames (SAN), use the
# same ssl_certificate / ssl_certificate_key paths on both HTTPS server blocks.
#
# Optional: nginx in Docker on the same Compose network as prod stack — set:
#   upstream ngpm_web { server web:6660; }
#   upstream ngpm_api { server api:6661; }
# and publish only 80/443 from the nginx container.
# ---------------------------------------------------------------------------
